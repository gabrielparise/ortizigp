<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Demo</title>
  <style>
    :root{
      --bg:#0a1022;
      --panel:#101a37;
      --border:rgba(255,255,255,.14);
      --text:#ecf2ff;
      --muted:rgba(236,242,255,.72);
      --accent:#34e6a0;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(650px 360px at 15% -10%, rgba(122,92,255,.34), transparent 62%),
        radial-gradient(650px 360px at 88% -20%, rgba(246,201,107,.28), transparent 62%),
        linear-gradient(180deg, #070b16, var(--bg) 45%, #070b16);
      display:grid;
      place-items:center;
      padding:16px;
    }
    .wrap{
      width:min(980px, 100%);
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(16,26,55,.94), rgba(10,16,34,.92));
      overflow:hidden;
      box-shadow:0 18px 36px rgba(0,0,0,.36);
    }
    .head{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      margin:0;
      font-size:16px;
      font-weight:700;
      letter-spacing:.01em;
    }
    .id{
      font-size:12px;
      color:var(--muted);
      font-family:"JetBrains Mono",Consolas,monospace;
    }
    .stage{
      position:relative;
      aspect-ratio:16/9;
      width:100%;
      background:#060a14;
      overflow:hidden;
    }
    .stage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .overlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(6,10,20,.18), rgba(6,10,20,.52));
    }
    .play{
      border:1px solid rgba(52,230,160,.46);
      background:linear-gradient(140deg, rgba(52,230,160,.28), rgba(52,230,160,.14));
      color:#fff;
      min-width:160px;
      min-height:46px;
      padding:10px 16px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }
    .foot{
      padding:10px 14px 14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:12px;
      color:var(--muted);
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 class="title" id="title">Game Demo</h1>
      <div class="id" id="gameId">ID: -</div>
    </div>
    <div class="stage">
      <img id="gameImage" src="imgs/ace_bonus.png" alt="Game thumb" />
      <div class="overlay">
        <button id="playBtn" class="play" type="button">Iniciar demo</button>
      </div>
    </div>
    <div class="foot">
      <span>Ambiente de demonstração em iframe</span>
      <span id="status">Status: pronto</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Game Demo";
    const id = params.get("id") || "-";
    const image = params.get("image") || "imgs/ace_bonus.png";

    const titleEl = document.getElementById("title");
    const gameIdEl = document.getElementById("gameId");
    const gameImageEl = document.getElementById("gameImage");
    const playBtn = document.getElementById("playBtn");
    const statusEl = document.getElementById("status");

    titleEl.textContent = name;
    gameIdEl.textContent = `ID: ${id}`;
    gameImageEl.src = image;
    gameImageEl.alt = `${name} thumb`;

    playBtn.addEventListener("click", () => {
      statusEl.textContent = "Status: demo em execução";
      playBtn.textContent = "Demo rodando";
      playBtn.disabled = true;
    });
  </script>
</body>
</html>
